<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Colin's Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
        <div class="lava-lamp">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
            <div class="blob blob-4"></div>
        </div>
        <div class="timer-container">
            <div class="display-main" id="timer-display">
                <div class="wheel-picker large" id="wheel-mins">
                    <div class="wheel-cylinder" id="cylinder-mins"></div>
                </div>
                <span class="main-separator">:</span>
                <div class="wheel-picker large" id="wheel-secs">
                    <div class="wheel-cylinder" id="cylinder-secs"></div>
                </div>
            </div>
            
            <div class="controls-minimal">
                <button id="btn-start" class="btn-main">START</button>
                <button id="btn-pause" class="btn-main hidden">PAUSE</button>
                <button id="btn-reset" class="btn-sub">RESET</button>
            </div>

            <div class="progress-ring-container">
                <svg width="1200" height="1200" viewBox="0 0 1200 1200">
                    <circle class="progress-bg" cx="600" cy="600" r="350"></circle>
                    <circle class="progress-fill" id="progress-bar" cx="600" cy="600" r="350"></circle>
                </svg>
            </div>

            <!-- Audio and Silent Mode -->
            <button id="btn-sound-toggle" class="sound-toggle-btn" title="Toggle Sound">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
            </button>
        </div>
    </div>
    
    <script type="module" src="./main.js"></script>
</body>
</html>
